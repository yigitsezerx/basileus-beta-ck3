l_english:
 # ─── Renovatio Imperii (Italia) capstone event ───
 basileus_italia.0001.t:0 "Restoration of the Roman Empire"
 basileus_italia.0001.desc:0 "#EMP Cradle of the Roman Empire — Italy, is in Roman hands once more.#!\n\n[GetTitleByKey('e_byzantium').GetName]'s imperial standards now fly from the foot of the Alps to the straits of Messina, by the grace of [renovator.GetFirstName]. The peninsula — cradle of the Empire, seat of the ancient [Glossary('Senate','ROMAN_SENATE_GLOSS')], burial-ground of the Caesars — has been gathered back into the body of the Empire.\n\nMore than three centuries gone, [justinian_the_great|E] — first of the restorers in a long time — dreamed of this very dream, and loosed his subordinates upon the West in the [Glossary('Gothic Wars','GOTHIC_WARS_GLOSS')] to make it real.\n\n[belisarius.GetName], the [Glossary('magister militum','MAGISTER_MILITUM_GLOSS')] who shattered the [Glossary('Vandals','VANDALS_GLOSS')] in a single afternoon, landed in Italy and wrenched Naples and Rome from the Goths — then held the Eternal City through a year-long siege that starved besieger and besieged alike.\n\nAnd when the war soured and King [Glossary('Totila','TOTILA_GLOSS')] stormed back across the land, it was the aged eunuch [narses.GetName] — chamberlain turned military commander — who came again with an army drawn from various peoples, and annihilated the [Glossary('Ostrogoths','OSTROGOTHS_GLOSS')] at [Glossary('Busta Gallorum','BUSTA_GALLORUM_GLOSS')] and [Glossary('Mons Lactarius','MONS_LACTARIUS_GLOSS')], ending their kingdom forever.\n\nThe price that was paid proved to be heavy: Cities were emptied, fields ruined by famine and plague, the [Glossary('Senate','ROMAN_SENATE_GLOSS')] of old Rome guttering into silence. [justinian.GetFirstName]'s [Glossary('Renovatio','RENOVATIO_GLOSS')] only partially outlived him, and with the coming of the [Glossary('Lombards','LOMBARDS_GLOSS')], Italy slipped away once more.\n\nBut the dream did not die — and today, where the restorers of old could not hold, I have prevailed. Let the shades of [justinian.GetFirstName], [belisarius.GetName] and [narses.GetName] look upon this and find their work finished at last.\n\n#EMP [Glossary('Renovatio Imperii Romanorum','RENOVATIO_GLOSS')]#! — the Restoration of the Roman Empire — is complete."
 basileus_italia.0001.a:0 "Let it be remembered for all time."

 # ─── Renovatio Imperii dynasty modifier ───
 basileus_renovatio_imperii:0 "Restorer of the Empire"
 basileus_renovatio_imperii_desc:0 "This character reunited Italy with the Empire, completing the #emp Renovatio#! begun by Justinian."
 basileus_renovatio_imperii_dynasty:0 "Restorers of the Empire"
 basileus_renovatio_imperii_dynasty_desc:0 "This dynasty restored Italy to the Roman Empire, fulfilling the dream of Justinian."

 # ─── Glossary entries (historical flavour, hover tooltips) ───
 ROMAN_SENATE_GLOSS:0 "The ancient #EMP Senate of Rome#!. Stripped of real power under the emperors, it lingered as a venerable body of the city's great families until the devastation of the #italic Gothic Wars#! snuffed it out in the 6th century."
 JUSTINIAN_GLOSS:0 "#EMP Justinian I#! (r. 527–565), who ruled from Constantinople. His #italic Renovatio Imperii#! aimed to reconquer the western provinces lost to the Germanic kingdoms — Africa, Italy, and the coast of Hispania — and his jurists codified Roman law in the #italic Corpus Juris Civilis#!."
 GOTHIC_WARS_GLOSS:0 "The #EMP Gothic Wars#!, two decades of campaigning by which the Eastern Roman Empire destroyed the Ostrogothic Kingdom and reclaimed Italy — at the ruinous cost of the peninsula's own devastation."
 MAGISTER_MILITUM_GLOSS:0 "#EMP Magister Militum#! — Master of the Soldiers, was one of the supreme military ranks of the late Roman army, commanding entire field armies in the emperor's name."
 VANDALS_GLOSS:0 "A Germanic people who carved a kingdom out of Roman Africa and sacked Rome. #EMP Belisarius#! annihilated them in a single lightning campaign, restoring Africa to the Empire."
 TOTILA_GLOSS:0 "#EMP Totila#!, the Ostrogothic king whose brilliant resurgence nearly undid the Roman reconquest — retaking Rome itself — before he was slain at Busta Gallorum."
 OSTROGOTHS_GLOSS:0 "The #EMP Eastern Goths#!, who under Theodoric the Great ruled Italy as a Gothic kingdom from Ravenna."
 BUSTA_GALLORUM_GLOSS:0 "The Battle of #EMP Busta Gallorum#!, where Narses shattered Totila's host; the Gothic king fell in the rout, breaking the back of Gothic resistance."
 MONS_LACTARIUS_GLOSS:0 "The Battle of #EMP Mons Lactarius#!, the last stand of the Ostrogoths under King Teia. Their defeat ended Gothic rule in Italy for good."
 RENOVATIO_GLOSS:0 "#EMP Renovatio Imperii Romanorum#! — the Restoration of the Roman Empire, Justinian's grand design to reconquer the lost Roman West and reunite the Mediterranean under a single emperor."
 CORPUS_GLOSS:0 "The #EMP Corpus Juris Civilis#! — Justinian's monumental codification of Roman law, the foundation of the legal tradition of the Empire and, later, of much of Europe."
 LOMBARDS_GLOSS:0 "The #EMP Lombards#!, a Germanic people who invaded Italy in the 6th century and established a kingdom that endured until the 8th century, when it was conquered by the Franks. The name lives on in the region of Lombardy in northern Italy."
